<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ship</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#111113" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      // Sync system color scheme to <html> class before first paint so Radix
      // appearance="inherit" picks it up without a flash of wrong theme.
      (function () {
        var d = document.documentElement;
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        function apply(dark) { d.classList.toggle("dark", dark); d.classList.toggle("light", !dark); }
        apply(mq.matches);
        mq.addEventListener("change", function (e) { apply(e.matches); });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
