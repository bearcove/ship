pre-commit:
  parallel: true
  jobs:
    - name: capn
      run: capn

    - name: oxfmt
      glob: "*.{js,ts,jsx,tsx,css.ts}"
      run: pnpm exec oxfmt --write {staged_files} && git add {staged_files}

    - name: oxlint
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm exec oxlint {staged_files}

    - name: typecheck
      run: cd frontend && pnpm exec tsgo --noEmit

    - name: tracey
      run: tracey query validate

pre-push:
  parallel: true
  jobs:
    - name: capn
      run: capn pre-push
